<!DOCTYPE html>
<html>
<head>
    <title>Cloud Threat Dashboard</title>

    <style>
        body {
            font-family: Arial;
            background-color: #0f172a;
            color: white;
            text-align: center;
        }

        h2 {
            margin-top: 20px;
        }

        table {
            margin: auto;
            border-collapse: collapse;
            width: 90%;
            background-color: #1e293b;
        }

        th, td {
            padding: 12px;
            border: 1px solid #334155;
        }

        th {
            background-color: #334155;
        }

        .high {
            color: #ef4444;
            font-weight: bold;
        }

        .medium {
            color: #f59e0b;
            font-weight: bold;
        }

        .low {
            color: #22c55e;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h2>🚨 Cloud Threat Detection Dashboard</h2>

    <table>
        <tr>
            <th>Time</th>
            <th>IP Address</th>
            <th>Threat Type</th>
            <th>Severity</th>
        </tr>

        {% for alert in alerts %}
        <tr>
            <td>{{ alert.time }}</td>
            <td>{{ alert.ip }}</td>
            <td>{{ alert.type }}</td>

            <td class="
                {% if alert.severity == 'High' %}high
                {% elif alert.severity == 'Medium' %}medium
                {% else %}low
                {% endif %}
            ">
                {{ alert.severity }}
            </td>
        </tr>
        {% endfor %}

    </table>

</body>
</html>
